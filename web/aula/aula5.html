<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Aula 5 - Colspan e Rowspan</title>
</head>
<body>
    <table border="1" width="200px">
        <tr>
            <td colspan="2">1</td>
            <!-- <td>2</td> -->
        </tr>
        <tr>
            <td>3</td>
            <td>4</td>
        </tr>
        <tr>
            <td colspan="2">5</td>
            <!-- <td>6</td> -->
        </tr>
        <tr>
            <td>7</td>
            <td>8</td>
        </tr>
    </table>

    <br/>

    <table border="1" width="200px">
        <tr>
            <td colspan="4">Candidatos Eliminados</td>
            <!-- <td>2</td>
            <td>3</td>
            <td>4</td> -->
        </tr>
        <tr>
            <td>5</td>
            <td>6</td>
            <td  colspan="2">7</td>
            <!-- <td>8</td> -->
        </tr>
        <tr>
            <td rowspan="2">9</td>
            <td>10</td>
            <td>11</td>
            <td>12</td>
        </tr>
        <tr>
            <!-- <td>13</td> -->
            <td>14</td>
            <td>15</td>
            <td>16</td>
        </tr>
    </table>

</body>
</html>
