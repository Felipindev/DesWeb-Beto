<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Formulario</title>
</head>
<body>
    <form action="">
        <h1>Preencha o formulário abaixo</h1>

        <fieldset>
           <legend> Dados pessoais</legend>

           <label for="name">Nome: </label>
           <input type="text">
           <label for="name">Sobrenome: </label>
           <input type="text">

            <label for="date">Nascimento: </label>
            <input type="date">

            <label for="rg">RG: </label>
            <input type="text">

            <label for="rg">CPF: </label>
            <input type="text">
        </fieldset>

        <fieldset>
            <legend> Dados de Endereço</legend>

            <label for="name">Rua: </label>
            <input type="text">
            <label for="name">Número: </label>
            <input type="number">

            <label for="name">Bairro: </label>
            <input type="text">

            <label for="rg">Estado: </label>
            <select>
                <option value="SP">SP</option>
                <option value="SP">MS</option>
                <option value="SP">MG</option>
                <option value="SP">RJ</option>
                <option value="SP">BA</option>
            </select>

            <label for="cidade">Cidade: </label>
            <input type="text">

            <label for="cep">CEP: </label>
            <input type="number">
            <span>-</span>
            <input type="number">
        </fieldset>

        <fieldset>
            <legend>Dados de Login</legend>

            <label for="email">Email: </label>
            <input type="email">
        </fieldset>
    </form>
</body>
</html>
